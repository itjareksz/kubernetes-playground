kind: Cluster
apiVersion: kind.x-k8s.io/v1alpha4
nodes:
  - role: control-plane
    labels:
      ingress-ready: "true"
  - role: worker
    labels:
      topology.kubernetes.io/zone: eu-east-1a
  - role: worker
    labels:
      topology.kubernetes.io/zone: eu-east-1b
networking:
  # Disable Kind default CNI 'kindnetd' because other CNI will be used
  disableDefaultCNI: true
